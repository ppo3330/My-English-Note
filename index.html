<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My English Note</title>
        <link rel="stylesheet" href="/src/styles.css" />
    </head>
    <body>
        <main>
            <h1>My English Note</h1>

            <section>
                <h2>노트 선택</h2>
                <div class="note-tabs" aria-label="노트 선택">
                    <button class="note-tab active" type="button" data-note-type="word">단어</button>
                    <button class="note-tab" type="button" data-note-type="phrasalVerb">구동사</button>
                    <button class="note-tab" type="button" data-note-type="sentence">문장</button>
                </div>
            </section>

            <section>
                <h2 id="current-note-title">단어 노트</h2>

                <form id="item-form">
                    <label>
                        <span id="english-label">영어 단어</span>
                        <input id="english-input" type="text" />
                    </label>

                    <label>
                        <span id="korean-label">한국어 뜻</span>
                        <input id="korean-input" type="text" />
                    </label>

                    <label id="source-field" class="hidden">
                        출처
                        <input id="source-input" type="text" />
                    </label>

                    <label>
                        예문
                        <input id="example-input" type="text" />
                    </label>

                    <label>
                        메모
                        <input id="memo-input" type="text" />
                    </label>

                    <button type="submit">저장</button>
                </form>
            </section>

            <section>
                <h2 id="list-title">저장한 단어</h2>

                <label>
                    검색
                    <input id="search-input" type="text" placeholder="Search" />
                </label>

                <p id="empty-message" class="empty-message">아직 저장한 항목이 없습니다.</p>
                <ul id="item-list"></ul>
            </section>

        
            <section>
                <h2>학습하기</h2>
                <div>
                    <button id="english-to-korean-button">영어->뜻</button>
                    <button id="korean-to-english-button">뜻->영어</button>

                    <div id="study-card">학습 항목을 선택하세요</div>

                    <button id="check-answer-button">정답보기</button>
                    <button id="known-answer-button">알고있음</button>
                    <button id="vague-answer-button">헷갈림</button>
                    <button id="no-answer-button">모름</button>

                    <p id="study-status">현재 상태: 새 항목</p>
                </div>
            </section>
        </main>

        <script type="module" src="/src/main.js"></script>
        
        
    </body>
</html>
